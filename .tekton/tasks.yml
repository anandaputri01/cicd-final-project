apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: cleanup
spec:
  description: This task removes all files from the workspace.
  workspaces:
    - name: source
  steps:
    - name: cleanup
      image: alpine:latest
      script: |
        #!/bin/sh
        rm -rf $(workspaces.source.path)/*
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: nose-test
spec:
  description: This task runs nosetests on the application.
  workspaces:
    - name: source
  params:
    - name: args
      type: string
      default: "-v"
  steps:
    - name: nosetests
      image: python:3.9-slim
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/bash
        pip install -r requirements.txt
        nosetests $(params.args) tests/
